<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloBot AI Chatbot</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Highlight.js for Code Blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-color: #8b5cf6;
            --accent-hover: #a78bfa;
            --user-msg-bg: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
            --ai-msg-bg: rgba(30, 41, 59, 0.72);
            --face-glow: #62f0ff;
            --robot-scale: 1;
            --transition: 0.28s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            background:
                radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.2), transparent 36%),
                radial-gradient(circle at 80% 85%, rgba(59, 130, 246, 0.16), transparent 40%),
                var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: floatBg 10s infinite ease-in-out alternate;
            opacity: 0.35;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            top: -10%;
            left: -5%;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes floatBg {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.08); }
        }

        .chat-container {
            width: 95%;
            max-width: 940px;
            height: 90vh;
            max-height: 840px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(3, 7, 18, 0.72), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--panel-border);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.62), rgba(15, 23, 42, 0.4));
            text-align: center;
            position: relative;
        }

        .logo { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .ai-icon { font-size: 25px; }
        .brand-title {
            position: relative;
            display: inline-block;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #22d3ee, #f472b6, #60a5fa);
            background-size: 220% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 22px rgba(139, 92, 246, 0.18);
            animation: brandShift 5s linear infinite, titleFloat 3s ease-in-out infinite;
        }

        .brand-title::after {
            content: 'HELLO-BOT';
            position: absolute;
            inset: 0;
            z-index: -1;
            background: linear-gradient(90deg, rgba(96, 165, 250, 0.28), rgba(167, 139, 250, 0.28), rgba(34, 211, 238, 0.28), rgba(244, 114, 182, 0.28));
            filter: blur(12px);
            opacity: 0.95;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes brandShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 220% 50%; }
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .system-prompt-container { margin-top: 12px; }
        .system-prompt-input {
            width: 100%;
            max-width: 410px;
            padding: 10px 16px;
            background: rgba(2, 6, 23, 0.48);
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            outline: none;
            transition: all var(--transition);
        }

        .system-prompt-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
            color: var(--text-primary);
        }

        .chat-input-area {
            width: min(760px, 92%);
            margin: 14px auto 8px;
            padding: 13px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.66), rgba(15, 23, 42, 0.44));
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 10px 28px rgba(2, 6, 23, 0.35);
        }

        #user-input {
            flex: 1;
            background: rgba(2, 6, 23, 0.52);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            min-height: 50px;
            max-height: 150px;
            line-height: 1.4;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #user-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        #user-input::placeholder { color: var(--text-secondary); }

        .send-btn {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 16px;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            box-shadow: 0 10px 22px rgba(124, 58, 237, 0.45);
        }

        .send-btn svg { width: 20px; height: 20px; }
        .send-btn:hover { background: linear-gradient(145deg, #a78bfa, #8b5cf6); }
        .send-btn:disabled { background: #334155; cursor: not-allowed; box-shadow: none; }

        .chat-history {
            flex: 1;
            padding: 14px 28px 26px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .message {
            display: flex;
            max-width: 84%;
            animation: fadeIn .36s cubic-bezier(.165,.84,.44,1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0);} }
        .user-message { align-self: flex-end; }
        .ai-message { align-self: flex-start; }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.58;
            font-size: .95rem;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.28);
        }

        .user-message .message-content {
            background: var(--user-msg-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .ai-message .message-content {
            background: var(--ai-msg-bg);
            border: 1px solid var(--panel-border);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 18px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.82), rgba(30, 41, 59, 0.7));
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1){animation-delay:-.32s;}
        .typing-dot:nth-child(2){animation-delay:-.16s;}

        @keyframes typingBounce {
            0%,80%,100% { transform: scale(0); opacity: .5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .ai-message .message-content pre {
            background: #1e1e2e !important;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
            border: 1px solid var(--panel-border);
        }

        .ai-message .message-content code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .ai-message .message-content pre code { background: transparent; padding: 0; }

        .robot-settings-btn {
            position: absolute;
            left: 16px;
            top: 16px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            background: rgba(2, 6, 23, 0.55);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            z-index: 10;
        }

        .robot-settings-btn svg { width: 16px; height: 16px; }
        .robot-settings-btn:hover { box-shadow: 0 0 14px rgba(56, 189, 248, 0.35); }

        .robot-settings-panel {
            position: absolute;
            top: 58px;
            left: 16px;
            width: 230px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.88));
            box-shadow: 0 14px 30px rgba(2, 6, 23, 0.5);
            text-align: left;
            z-index: 11;
        }

        .robot-settings-panel h3 {
            font-size: 0.82rem;
            margin-bottom: 10px;
            color: #bfdbfe;
            letter-spacing: 0.4px;
        }

        .robot-settings-panel label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: .74rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .robot-settings-panel input[type="color"] {
            width: 30px;
            height: 24px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            background: transparent;
            padding: 0;
        }

        .robot-settings-panel select,
        .robot-settings-panel input[type="range"] {
            width: 120px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            background: rgba(15, 23, 42, 0.7);
            color: var(--text-primary);
            font-size: .74rem;
            padding: 4px 6px;
        }

        .robot-settings-panel input[type="range"] { padding: 0; }

        .bot {
            position: absolute;
            right: 10px;
            top: -2px;
            width: calc(150px * var(--robot-scale));
            height: calc(170px * var(--robot-scale));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 6;
            transform-origin: center top;
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform 0.25s ease, filter 0.25s ease;
            filter: drop-shadow(0 14px 26px rgba(2, 6, 23, 0.56));
        }

        .bot.dragging { cursor: grabbing; filter: drop-shadow(0 18px 30px rgba(2, 6, 23, .8)); }
        .bot.float-enabled { animation: botFloat 3.6s ease-in-out infinite; }

        @keyframes botFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(0.6deg); }
        }

        .bot-head {
            width: 110px;
            height: 88px;
            border-radius: 28px;
            background: linear-gradient(160deg, #f8fcff, #d5ebff);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 12px 26px rgba(72, 149, 255, 0.25), inset 0 -10px 24px rgba(140, 200, 255, .32);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform .25s ease;
        }

        .bot-head::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 16px;
            width: 48px;
            height: 16px;
            border-radius: 999px;
            background: rgba(255,255,255,.65);
            filter: blur(1px);
        }

        .bot-face {
            width: 90px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(180deg, #080f1f, #111b31 70%);
            border: 1px solid rgba(168, 200, 255, 0.2);
            box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-rows: 1fr auto;
            padding: 12px 12px 10px;
            position: relative;
            overflow: hidden;
        }

        .bot-face::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.06), transparent 42%);
            pointer-events: none;
        }

        .bot-eyes {
            display: flex;
            align-items: center;
            justify-content: space-between;
            line-height: 1;
            color: var(--face-glow);
            text-shadow: 0 0 12px var(--face-glow), 0 0 26px color-mix(in srgb, var(--face-glow) 60%, transparent);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transform: translateX(var(--look-x, 0px)) translateY(var(--look-y, 0px));
            transition: transform .15s linear;
        }

        .bot-mouth {
            justify-self: center;
            color: var(--face-glow);
            text-shadow: 0 0 10px var(--face-glow), 0 0 22px color-mix(in srgb, var(--face-glow) 60%, transparent);
            font-size: 16px;
            line-height: 1;
            transform: translateY(-2px) translateX(var(--look-x, 0px));
            transition: transform .15s linear;
        }

        .bot-extra {
            position: absolute;
            right: 8px;
            bottom: 6px;
            color: var(--face-glow);
            text-shadow: 0 0 8px var(--face-glow);
            font-size: 12px;
            opacity: 0;
            transition: opacity .2s;
        }

        .bot-face.show-extra .bot-extra { opacity: 1; }

        .bot-antenna {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, #d9f0ff, #8bc7ff);
        }

        .bot-antenna::before {
            content: '';
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #74beff);
            box-shadow: 0 0 14px #8fd5ff;
            animation: antennaPulse 1.8s ease-in-out infinite;
        }

        @keyframes antennaPulse {
            0%,100%{ transform: translateX(-50%) scale(1); opacity: .8;}
            50%{ transform: translateX(-50%) scale(1.2); opacity:1;}
        }

        .bot-body {
            margin-top: 8px;
            width: 76px;
            height: 64px;
            border-radius: 36px;
            background: linear-gradient(180deg, #f7fbff, #d6ecff);
            border: 1px solid rgba(255,255,255,.85);
            position: relative;
            box-shadow: 0 12px 24px rgba(85, 170, 255, .22), inset 0 -8px 20px rgba(148, 213, 255, 0.3);
        }

        .bot-core {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-45%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff, var(--face-glow));
            box-shadow: 0 0 16px var(--face-glow);
            animation: corePulse 1.6s ease-in-out infinite;
        }

        @keyframes corePulse {
            0%,100%{ transform: translate(-50%,-45%) scale(1); opacity:.82; }
            50%{ transform: translate(-50%,-45%) scale(1.18); opacity:1; }
        }

        .bot-arm {
            position: absolute;
            width: 13px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(180deg, #d3ecff, #a8d6ff);
            border: 1px solid rgba(255,255,255,.7);
            top: 102px;
            transform-origin: top center;
        }

        .bot-arm.left { left: 28px; transform: rotate(16deg); }
        .bot-arm.right { right: 28px; transform: rotate(-16deg); }

        .bot[data-state="thinking"] .bot-head,
        .bot[data-state="confused"] .bot-head,
        .bot[data-state="surprised"] .bot-head { transform: rotate(-3deg); }

        .bot[data-state="angry"] .bot-head { transform: rotate(2deg); }

        .bot[data-state="blink"] .bot-eyes { transform: scaleY(.2) translateX(var(--look-x, 0px)) translateY(var(--look-y, 0px)); }

        .bot.wave .bot-arm.right { animation: botWave .8s ease-in-out 3; }

        @keyframes botWave {
            0%,100%{ transform: rotate(-16deg); }
            50%{ transform: rotate(-52deg); }
        }

        .bot.greet .bot-head { animation: greetNod .75s ease-in-out 2; }

        @keyframes greetNod {
            0%,100%{ transform: translateY(0) rotate(0deg); }
            50%{ transform: translateY(-3px) rotate(-4deg); }
        }

        @media (max-width: 700px) {
            .chat-container { width: 100%; height: 100vh; border-radius: 0; border: none; }
            .message { max-width: 90%; }
            .robot-settings-btn { left: 10px; top: 12px; }
            .robot-settings-panel { left: 10px; top: 54px; width: 206px; }
            .bot {
                right: 0;
                width: calc(128px * var(--robot-scale));
                height: calc(150px * var(--robot-scale));
            }
            .bot-head { width: 94px; height: 76px; }
            .bot-face { width: 76px; height: 50px; }
            .bot-body { width: 68px; height: 58px; }
            .bot-arm { top: 92px; height: 38px; }
            .bot-arm.left { left: 24px; }
            .bot-arm.right { right: 24px; }
            .chat-input-area { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="chat-container">
        <header class="chat-header">
            <button class="robot-settings-btn" id="robot-settings-btn" type="button" aria-label="Robot settings" title="Customize robot">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <div class="robot-settings-panel" id="robot-settings-panel" hidden>
                <h3>Robot Studio</h3>
                <label>
                    Face Color
                    <input type="color" id="face-color" value="#62f0ff">
                </label>
                <label>
                    Robot Size
                    <input type="range" id="robot-size" min="0.5" max="2" step="0.1" value="1">
                </label>
                <label>
                    Expression
                    <select id="expression-select">
                        <option value="happy">happy</option>
                        <option value="neutral">neutral</option>
                        <option value="wink">wink</option>
                        <option value="sad">sad</option>
                        <option value="angry">angry</option>
                        <option value="love">love</option>
                        <option value="thinking">thinking</option>
                        <option value="sleep">sleep</option>
                        <option value="surprised">surprised</option>
                        <option value="confused">confused</option>
                    </select>
                </label>
                <label>
                    Floating
                    <input type="checkbox" id="toggle-float" checked>
                </label>
                <label>
                    Follow Mouse
                    <input type="checkbox" id="toggle-follow" checked>
                </label>
            </div>

            <div class="bot float-enabled" id="bot" data-state="neutral" aria-hidden="true">
                <div class="bot-head" id="bot-head">
                    <div class="bot-antenna"></div>
                    <div class="bot-face" id="bot-face">
                        <div class="bot-eyes">
                            <span id="eye-left">•</span>
                            <span id="eye-right">•</span>
                        </div>
                        <div class="bot-mouth" id="bot-mouth">‿</div>
                        <span class="bot-extra" id="bot-extra"></span>
                    </div>
                </div>
                <div class="bot-body">
                    <span class="bot-core"></span>
                </div>
                <div class="bot-arm left"></div>
                <div class="bot-arm right"></div>
            </div>

            <div class="logo">
                <div class="ai-icon">✨</div>
                <h1 class="brand-title">HELLO-BOT</h1>
            </div>
            
            <div class="system-prompt-container">
                <input type="text" id="system-prompt" class="system-prompt-input" placeholder="Set AI Persona (e.g., You are a Python expert)">
            </div>
        </header>

        <form class="chat-input-area" id="chat-form">
            <textarea id="user-input" rows="1" placeholder="Type your message here..." required autofocus></textarea>
            <button type="submit" class="send-btn" aria-label="Send Message">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>

        <section class="chat-history" id="chat-history">
            <!-- Messages will be rendered here -->
            <div class="message ai-message welcome-message">
                <div class="message-content">
                    <p>Hello! I'm HelloBot. How can I help you today?</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatForm = document.getElementById('chat-form');
            const userInput = document.getElementById('user-input');
            const chatHistory = document.getElementById('chat-history');
            const systemPromptInput = document.getElementById('system-prompt');
            const sendBtn = chatForm.querySelector('.send-btn');

            const bot = document.getElementById('bot');
            const botFace = document.getElementById('bot-face');
            const botHead = document.getElementById('bot-head');
            const eyeLeft = document.getElementById('eye-left');
            const eyeRight = document.getElementById('eye-right');
            const botMouth = document.getElementById('bot-mouth');
            const botExtra = document.getElementById('bot-extra');

            const settingsBtn = document.getElementById('robot-settings-btn');
            const settingsPanel = document.getElementById('robot-settings-panel');
            const faceColorInput = document.getElementById('face-color');
            const robotSizeInput = document.getElementById('robot-size');
            const expressionSelect = document.getElementById('expression-select');
            const floatToggle = document.getElementById('toggle-float');
            const followToggle = document.getElementById('toggle-follow');

            const expressions = {
                happy:      { left: '^', right: '^', mouth: '‿', extra: '', mood: 'happy' },
                neutral:    { left: '•', right: '•', mouth: '─', extra: '', mood: 'neutral' },
                wink:       { left: ';', right: '•', mouth: '‿', extra: '', mood: 'wink' },
                sad:        { left: '•', right: '•', mouth: '_', extra: '', mood: 'sad' },
                angry:      { left: '>', right: '<', mouth: '︿', extra: '', mood: 'angry' },
                love:       { left: '♥', right: '♥', mouth: '‿', extra: '', mood: 'love' },
                thinking:   { left: '•', right: '•', mouth: '~', extra: '…', mood: 'thinking' },
                sleep:      { left: '-', right: '-', mouth: '﹏', extra: 'z', mood: 'sleep' },
                surprised:  { left: 'o', right: 'o', mouth: 'O', extra: '!', mood: 'surprised' },
                confused:   { left: '?', right: '•', mouth: '﹋', extra: '?', mood: 'confused' }
            };

            let currentExpression = 'neutral';
            let followMouseEnabled = true;
            let floatingEnabled = true;
            let autoExpressionTimer;
            let blinkTimer;

            function setExpression(name) {
                const expression = expressions[name] || expressions.neutral;
                currentExpression = name;
                eyeLeft.textContent = expression.left;
                eyeRight.textContent = expression.right;
                botMouth.textContent = expression.mouth;
                botExtra.textContent = expression.extra;

                if (expression.extra) {
                    botFace.classList.add('show-extra');
                } else {
                    botFace.classList.remove('show-extra');
                }

                bot.setAttribute('data-state', expression.mood);
                if (expressionSelect.value !== name) {
                    expressionSelect.value = name;
                }
            }

            function temporaryExpression(name, ms = 1400) {
                const prev = currentExpression;
                setExpression(name);
                window.setTimeout(() => setExpression(prev), ms);
            }

            function runGreetingAnimation() {
                bot.classList.add('greet');
                setExpression('happy');
                setTimeout(() => {
                    bot.classList.remove('greet');
                    setExpression('neutral');
                }, 1400);
            }

            function startAutoExpressionChange() {
                const cycle = ['happy', 'neutral', 'thinking', 'wink', 'love', 'confused', 'surprised'];
                let index = 0;
                clearInterval(autoExpressionTimer);
                autoExpressionTimer = setInterval(() => {
                    index = (index + 1) % cycle.length;
                    if (currentExpression === 'sleep' || currentExpression === 'angry') return;
                    setExpression(cycle[index]);
                }, 10000);
            }

            function startBlinking() {
                clearInterval(blinkTimer);
                blinkTimer = setInterval(() => {
                    const prev = currentExpression;
                    bot.setAttribute('data-state', 'blink');
                    setTimeout(() => bot.setAttribute('data-state', prev), 180);
                }, 3200);
            }

            function wave() {
                bot.classList.add('wave');
                setTimeout(() => bot.classList.remove('wave'), 2600);
            }

            function applyFaceColor(value) {
                document.documentElement.style.setProperty('--face-glow', value);
            }

            function applySize(value) {
                document.documentElement.style.setProperty('--robot-scale', value);
            }

            function enableDragging() {
                let dragging = false;
                let startX = 0;
                let startY = 0;
                let originX = 0;
                let originY = 0;

                const setPosition = (x, y) => {
                    bot.style.left = `${x}px`;
                    bot.style.top = `${y}px`;
                    bot.style.right = 'auto';
                };

                bot.addEventListener('pointerdown', (event) => {
                    dragging = true;
                    bot.classList.add('dragging');
                    const rect = bot.getBoundingClientRect();
                    const containerRect = chatForm.closest('.chat-container').getBoundingClientRect();
                    originX = rect.left - containerRect.left;
                    originY = rect.top - containerRect.top;
                    startX = event.clientX;
                    startY = event.clientY;
                    if (bot.setPointerCapture) {
                        bot.setPointerCapture(event.pointerId);
                    }
                });

                bot.addEventListener('pointermove', (event) => {
                    if (!dragging) return;
                    const containerRect = chatForm.closest('.chat-container').getBoundingClientRect();
                    const botRect = bot.getBoundingClientRect();
                    const dx = event.clientX - startX;
                    const dy = event.clientY - startY;
                    let nextX = originX + dx;
                    let nextY = originY + dy;
                    const maxX = containerRect.width - botRect.width;
                    const maxY = containerRect.height - botRect.height;
                    nextX = Math.max(0, Math.min(nextX, maxX));
                    nextY = Math.max(0, Math.min(nextY, maxY));
                    setPosition(nextX, nextY);
                });

                const stopDrag = (event) => {
                    if (!dragging) return;
                    dragging = false;
                    bot.classList.remove('dragging');
                    if (bot.releasePointerCapture) {
                        bot.releasePointerCapture(event.pointerId);
                    }
                };

                bot.addEventListener('pointerup', stopDrag);
                bot.addEventListener('pointercancel', stopDrag);
            }

            function updateLookTowardCursor(event) {
                if (!followMouseEnabled) return;
                const rect = bot.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = (event.clientX - centerX) / 40;
                const dy = (event.clientY - centerY) / 40;
                const x = Math.max(-4, Math.min(dx, 4));
                const y = Math.max(-3, Math.min(dy, 3));
                bot.style.setProperty('--look-x', `${x}px`);
                bot.style.setProperty('--look-y', `${y}px`);

                const distance = Math.hypot(event.clientX - centerX, event.clientY - centerY);
                if (distance < 140) {
                    botHead.style.transform = `rotate(${x * 0.8}deg)`;
                } else if (!String(bot.getAttribute('data-state')).includes('angry')) {
                    botHead.style.transform = '';
                }
            }

            settingsBtn.addEventListener('click', () => {
                if (settingsPanel.hasAttribute('hidden')) {
                    settingsPanel.removeAttribute('hidden');
                } else {
                    settingsPanel.setAttribute('hidden', '');
                }
            });

            document.addEventListener('click', (event) => {
                const insidePanel = settingsPanel.contains(event.target);
                const onButton = settingsBtn.contains(event.target);
                if (!insidePanel && !onButton) {
                    settingsPanel.setAttribute('hidden', '');
                }
            });

            expressionSelect.addEventListener('change', (event) => setExpression(event.target.value));
            faceColorInput.addEventListener('input', (event) => applyFaceColor(event.target.value));
            robotSizeInput.addEventListener('input', (event) => applySize(event.target.value));

            floatToggle.addEventListener('change', (event) => {
                floatingEnabled = event.target.checked;
                if (floatingEnabled) {
                    bot.classList.add('float-enabled');
                } else {
                    bot.classList.remove('float-enabled');
                }
            });

            followToggle.addEventListener('change', (event) => {
                followMouseEnabled = event.target.checked;
                if (!followMouseEnabled) {
                    bot.style.setProperty('--look-x', '0px');
                    bot.style.setProperty('--look-y', '0px');
                    botHead.style.transform = '';
                }
            });

            document.addEventListener('mousemove', updateLookTowardCursor);
            bot.addEventListener('click', () => {
                wave();
                temporaryExpression('happy', 1700);
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === '1') setExpression('happy');
                if (event.key === '2') setExpression('sad');
                if (event.key === '3') setExpression('angry');
                if (event.key === '4') setExpression('love');
                if (event.key === '5') setExpression('thinking');
            });

            enableDragging();
            startAutoExpressionChange();
            startBlinking();
            runGreetingAnimation();

            marked.setOptions({
                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                langPrefix: 'hljs language-',
                breaks: true,
                gfm: true
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
                if (this.value.trim() === '') {
                    sendBtn.disabled = true;
                    setExpression('neutral');
                } else {
                    sendBtn.disabled = false;
                    setExpression('thinking');
                }
            });

            userInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    if (this.value.trim() !== '') {
                        chatForm.dispatchEvent(new Event('submit'));
                    }
                }
            });

            chatForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const message = userInput.value.trim();
                const systemPrompt = systemPromptInput.value.trim();
                if (!message) return;

                userInput.value = '';
                userInput.style.height = 'auto';
                sendBtn.disabled = true;

                appendMessage('user', message, false);
                wave();
                setExpression('thinking');

                const typingId = appendTypingIndicator();

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message, system_prompt: systemPrompt })
                    });

                    const data = await response.json();
                    removeMessage(typingId);

                    if (response.ok && data.choices && data.choices.length > 0) {
                        const aiResponse = data.choices[0].message.content;
                        appendMessage('ai', aiResponse, true);
                        setExpression('happy');
                    } else {
                        appendMessage('ai', 'Error: ' + (data.error || 'Failed to generate response.'), false);
                        setExpression('sad');
                    }
                } catch (error) {
                    removeMessage(typingId);
                    appendMessage('ai', 'Connection error. Please ensure the backend is running.', false);
                    setExpression('confused');
                }
            });

            function appendMessage(sender, text, isMarkdown) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}-message`;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                if (isMarkdown && sender === 'ai') {
                    contentDiv.innerHTML = marked.parse(text);
                    contentDiv.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                } else {
                    contentDiv.textContent = text;
                }

                msgDiv.appendChild(contentDiv);
                chatHistory.appendChild(msgDiv);
                scrollToBottom();
            }

            function appendTypingIndicator() {
                const id = 'typing-' + Date.now();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ai-message';
                msgDiv.id = id;

                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

                msgDiv.appendChild(indicator);
                chatHistory.appendChild(msgDiv);
                scrollToBottom();
                return id;
            }

            function removeMessage(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            }

            function scrollToBottom() {
                chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
